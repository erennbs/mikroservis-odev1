# Etiya11 Microservices - Altyapı + Uygulama Compose Dosyası
#
# Icerik:
#   - Altyapi: postgres, kafka, connect (Debezium), redis, redisinsight, keycloak
#   - Uygulama: config-server, eureka-server, gateway-server, product/order/
#     payment/notification-service (hepsi multi-stage build ile imajlanir)
#
# Calistirmak icin (ilk seferde imajlar build edilir):
#   cd infra
#   podman compose -f docker-compose.yml up -d --build
#
# Durdurmak için:
#   podman compose -f docker-compose.yml down
#
# Volume'lerle birlikte tamamen silmek için:
#   podman compose -f docker-compose.yml down -v
#
# NOT: Uygulama servisleri config-server'dan "docker" profili (SPRING_PROFILES_ACTIVE=docker)
# ile ayar ceker. config-server ise "native" backend ile ../configs klasorunu volume olarak
# okur; bu sayede configs/ altindaki degisiklikler GitHub'a push edilmeden gecerli olur.
# Erisim noktalari: Gateway http://localhost:8000  Eureka http://localhost:8761
#                   Config http://localhost:8888   Keycloak http://localhost:8090

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL veritabanı
  # ---------------------------------------------------------------------------
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: etiya-postgres
    restart: unless-stopped
    # Debezium (CDC) icin Postgres'in transaction log'u "logical" seviyede yazmali.
    # wal_level=logical olmadan replication slot / pgoutput calismaz.
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: productdb
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Ilk acilista (bos volume) order-service icin orderdb veritabanini olusturur.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d productdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Apache Kafka (KRaft modu - Zookeeper'a ihtiyaç duymaz)
  # ---------------------------------------------------------------------------
  kafka:
    image: docker.io/apache/kafka:3.7.0
    container_name: etiya-kafka
    restart: unless-stopped
    ports:
      # Host (uygulamalar) için dış erişim portu
      - "9092:9092"
    environment:
      # --- KRaft (broker + controller aynı node) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # --- Listener tanımları ---
      # PLAINTEXT: container ağı içinden erişim (kafka:29092)
      # PLAINTEXT_HOST: host makineden erişim (localhost:9092)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # --- Tek node için replikasyon ayarları ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # --- Veri ve cluster ayarları ---
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: etiya-kafka-cluster-001
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Kafka Connect + Debezium (CDC)
  #
  # Postgres'in WAL log'unu okuyup outbox_events tablosuna yapilan INSERT'leri
  # Kafka'ya event olarak yazar. Polling yapan OutboxMessageRelay'in yerini alir.
  #
  # Connector'i kaydetmek icin (servisler ayaga kalktiktan ve order-service
  # tablolari olusturduktan SONRA):
  #   Invoke-RestMethod -Method Post -Uri http://localhost:8083/connectors `
  #     -ContentType application/json `
  #     -InFile infra/debezium/order-outbox-connector.json
  # Ayrintili adimlar icin: infra/DEBEZIUM.md
  # ---------------------------------------------------------------------------
  connect:
    image: quay.io/debezium/connect:3.0
    container_name: etiya-connect
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      # Kafka Connect REST API (connector kaydi burada yapilir)
      - "8083:8083"
    environment:
      # Kafka broker'a container agi icinden erisim
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: etiya-connect-cluster
      # Connect'in kendi durumunu tuttugu internal topic'ler
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      # Tek node Kafka -> internal topic'ler tek replica olmali
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      # Mesaj degeri duz JSON objesi olsun (product-service boyle bekliyor)
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Connector otomatik kayit yardimcisi (tek seferlik calisir, sonra kapanir)
  #
  # Connect REST API hazir olana kadar bekler, sonra Debezium connector'ini
  # kaydeder. Boylece elle "POST /connectors" adimina gerek kalmaz.
  # Idempotent'tir: connector zaten varsa (HTTP 409) hata vermez.
  #
  # NOT: order-service VE payment-service ayakta olmali (her iki DB'de de outbox_events
  # tablosu olusmus olmali), aksi halde connector baslar ama izlenecek tabloyu bulamaz.
  # infra/debezium/ altindaki tum *.json connector'lari kaydedilir.
  # ---------------------------------------------------------------------------
  connect-register:
    image: docker.io/curlimages/curl:8.11.1
    container_name: etiya-connect-register
    depends_on:
      connect:
        condition: service_started
    restart: "no"
    volumes:
      - ./debezium:/config:ro
    entrypoint:
      - sh
      - -c
      - >
        echo 'Connect REST bekleniyor...';
        until curl -sf http://connect:8083/connectors >/dev/null 2>&1; do sleep 3; done;
        echo 'Connect hazir, connector(lar) kaydediliyor...';
        rc=0;
        for f in /config/*.json; do
        name=$$(basename "$$f");
        code=$$(curl -s -o /dev/null -w '%{http_code}' -X POST
        -H 'Content-Type: application/json'
        --data @"$$f"
        http://connect:8083/connectors);
        if [ "$$code" = "201" ] || [ "$$code" = "409" ]; then
        echo "$$name hazir (HTTP $$code).";
        else
        echo "$$name kaydi BASARISIZ (HTTP $$code)."; rc=1;
        fi;
        done;
        exit $$rc
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Redis - Dagitik (distributed) cache
  #
  # product-service GET sonuclarini burada tutar; POST/PUT/DELETE ile invalidate
  # edilir. Dagitik oldugu icin tum product-service instance'lari ayni cache'i
  # paylasir. Uygulama baglantisi: localhost:6379 (dev), redis:6379 (container agi).
  # ---------------------------------------------------------------------------
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: etiya-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Redis Insight - Redis icin web tabanli yonetim/gorsellestirme arayuzu
  #
  # Tarayicidan: http://localhost:5540
  # Ilk acilista bir Redis baglantisi ekleyin:
  #   Host: redis   Port: 6379   (container agi icinden)
  # ---------------------------------------------------------------------------
  redisinsight:
    image: docker.io/redis/redisinsight:latest
    container_name: etiya-redisinsight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Keycloak - Kimlik ve Erisim Yonetimi (IAM / OIDC saglayicisi)
  #
  # Tum servisler (gateway + is servisleri) OAuth2 Resource Server olarak
  # calisir ve JWT'leri bu Keycloak'in "etiya" realm'i uzerinden dogrular.
  #
  # - Admin konsolu:  http://localhost:8090  (admin / admin)
  # - Issuer (realm): http://localhost:8090/realms/etiya
  # - Acilista ./keycloak/realm-export.json otomatik import edilir
  #   (--import-realm): "etiya" realm'i, USER/ADMIN rolleri, ornek kullanicilar
  #   ve "etrade-client" client'i hazir gelir.
  #
  # Token almak (password / direct access grant) icin:
  #   curl -s -X POST \
  #     http://localhost:8090/realms/etiya/protocol/openid-connect/token \
  #     -d 'client_id=etrade-client' -d 'grant_type=password' \
  #     -d 'username=admin' -d 'password=admin123'
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: etiya-keycloak
    restart: unless-stopped
    command:
      - "start-dev"
      - "--import-realm"
    environment:
      # Keycloak yonetici kullanicisi (yalnizca dev/lokal icin).
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # start-dev H2 (in-memory) DB kullanir; lokal gelistirme icin yeterli.
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8090:8080"
    volumes:
      # Acilista import edilecek realm tanimi.
      - ./keycloak:/opt/keycloak/data/import:ro
    networks:
      - etiya-net

  # ===========================================================================
  # UYGULAMA SERVISLERI (Spring Boot mikroservisler)
  #
  # Her biri kendi Dockerfile'i ile multi-stage build edilir. Build context repo
  # kokudur (..), cunku her modulun pom'u kok pom'a (parent) ihtiyac duyar.
  # Servisler ayarlarini config-server'dan "docker" profili ile ceker
  # (SPRING_PROFILES_ACTIVE=docker), config-server ise configs/ klasorunu volume
  # olarak mount edip "native" backend ile sunar (GitHub'a push gerekmez).
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Config Server - tum servislerin ilk basvurdugu konfigurasyon kaynagi.
  # native backend: /configs volume'unden okur (bkz. config-server application.yml).
  # ---------------------------------------------------------------------------
  config-server:
    build:
      context: ..
      dockerfile: config-server/Dockerfile
    image: etiya/config-server:latest
    container_name: etiya-config-server
    restart: unless-stopped
    environment:
      # native backend'i aktive eder -> configs/ klasoru /configs'ten sunulur.
      SPRING_PROFILES_ACTIVE: native
    volumes:
      # Repo kokundeki configs/ klasoru; config-server file:/configs/{application} okur.
      - ../configs:/configs:ro
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Eureka Server - servis kesfi (service discovery).
  # ---------------------------------------------------------------------------
  eureka-server:
    build:
      context: ..
      dockerfile: eureka-server/Dockerfile
    image: etiya/eureka-server:latest
    container_name: etiya-eureka-server
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # API Gateway - tek giris noktasi (localhost:8000). JWT'yi Keycloak'a dogrular,
  # istekleri Eureka'dan cozerek (lb://) ilgili servise yonlendirir.
  # ---------------------------------------------------------------------------
  gateway-server:
    build:
      context: ..
      dockerfile: gateway-server/Dockerfile
    image: etiya/gateway-server:latest
    container_name: etiya-gateway-server
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
    ports:
      - "8000:8000"
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Product Service - urun CRUD + Redis cache. Rastgele port; Eureka'ya kaydolur.
  # Gateway uzerinden erisilir (host port yayinlanmaz).
  # ---------------------------------------------------------------------------
  product-service:
    build:
      context: ..
      dockerfile: product-service/Dockerfile
    image: etiya/product-service:latest
    container_name: etiya-product-service
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Order Service - siparis. Kendi orderdb'sine yazar; outbox_events'i Debezium izler.
  # ---------------------------------------------------------------------------
  order-service:
    build:
      context: ..
      dockerfile: order-service/Dockerfile
    image: etiya/order-service:latest
    container_name: etiya-order-service
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Payment Service - odeme. order-created'i dinler, paymentdb'ye yazar; outbox
  # uzerinden payment-created uretir (Debezium).
  # ---------------------------------------------------------------------------
  payment-service:
    build:
      context: ..
      dockerfile: payment-service/Dockerfile
    image: etiya/payment-service:latest
    container_name: etiya-payment-service
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Notification Service - bildirim. payment-created'i dinler; veritabani yoktur.
  # ---------------------------------------------------------------------------
  notification-service:
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
    image: etiya/notification-service:latest
    container_name: etiya-notification-service
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
    networks:
      - etiya-net

volumes:
  postgres-data:
  kafka-data:
  redis-data:
  redisinsight-data:

networks:
  etiya-net:
    driver: bridge
