# gateway-server - TUM profillerde ortak ayarlar.
server:
  # 8888 artik config-server'a ait oldugu icin gateway 8080'de calisir.
  port: 8000

spring:
  # Guvenlik: Gateway'i OAuth2 Resource Server yapar. Gelen JWT'ler bu Keycloak
  # realm'ine (issuer) karsi dogrulanir; gecersizse istek 401 ile reddedilir ve
  # downstream'e hic gitmez. Lokal/dev icin varsayilan localhost:8090; prod'da
  # KEYCLOAK_ISSUER_URI ortam degiskeni ile override edilir.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/etiya}

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Gelen tum /api/products istekleri product-service'e yonlendirilir.
            # lb:// semasi: hedef adres Eureka'dan cozulur ve load balancing uygulanir.
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/products/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
            # Gelen tum /api/payments istekleri payment-service'e yonlendirilir.
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**
            # Gelen tum /api/notifications istekleri notification-service'e yonlendirilir.
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

eureka:
  client:
    register-with-eureka: true # kendini ayaga kalktigin an eurekaya tanit
    fetch-registry: true # istenildiginde diger servislerin bilgisini cek
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    prefer-ip-address: true
