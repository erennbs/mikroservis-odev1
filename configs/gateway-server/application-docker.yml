# DOCKER profili: container agi (servisler birbirine servis ismiyle erisir).
spring:
  # Guvenlik: JWT'nin "iss" claim'i host'tan alinan token'larla eslessin diye
  # issuer-uri localhost:8090 kalir; ancak JWKS (imza anahtarlari) container aginda
  # localhost'tan erisilemeyecegi icin jwk-set-uri Keycloak'in ic adresine bakar.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8090/realms/etiya
          jwk-set-uri: http://keycloak:8080/realms/etiya/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: INFO
