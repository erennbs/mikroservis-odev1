# PROD profili: production. Tum baglanti bilgileri ortam degiskenlerinden gelir.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:paymentdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:kafka:9092}

eureka:
  client:
    service-url:
      defaultZone: http://eureka.etiya.com/eureka/

logging:
  level:
    com.etiya: INFO
