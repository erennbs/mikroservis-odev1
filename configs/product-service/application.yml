# product-service - TUM profillerde ortak ayarlar.
# Ortama gore degisen ayarlar (DB, Kafka, Eureka adresleri, log seviyesi)
# application-{dev,test,prod}.yml dosyalarindadir.
server:
  # Rastgele port; instance Eureka'ya kendini kaydeder.
  port: 0

spring:
  # Guvenlik: OAuth2 Resource Server. Gelen JWT'ler bu Keycloak realm'ine (issuer)
  # karsi dogrulanir. Lokal/dev icin varsayilan localhost:8090; prod'da
  # KEYCLOAK_ISSUER_URI ortam degiskeni ile override edilir.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/etiya}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  cloud:
    function:
      definition: orderCreated
    stream:
      bindings:
        # Consumer: "orderCreated" fonksiyonu "order-created" Kafka topic'ini dinler.
        orderCreated-in-0:
          destination: order-created
          group: product-service

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    register-with-eureka: true # kendini ayağa kalktığın an eurekaya tanıt
    fetch-registry: true # istenildiğinde diğer servislerin bilgisini çek
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    prefer-ip-address: true
