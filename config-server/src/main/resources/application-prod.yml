# PROD profili: production. Git uri/label ortam degiskeni ile override edilebilir.
spring:
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:https://github.com/erennbs/mikroservis-odev1.git}
          default-label: ${CONFIG_GIT_LABEL:master}

logging:
  level:
    org.springframework.cloud.config: WARN
