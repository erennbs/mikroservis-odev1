spring:
  application:
    name: eureka-server

  # Aktif profil (dev/test/prod). SPRING_PROFILES_ACTIVE ile override edilebilir.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Config Server baglantisi. Servis, tum diger ayarlarini config-server uzerinden
  # configs/eureka-server/ klasorundeki application-<profil>.yml dosyalarindan ceker.
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
